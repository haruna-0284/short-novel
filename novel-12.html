        　手相ってのはごちゃごちゃして難しい。どの線がどれやら。<br>
        「あんた、何が知りたいんだい」<br>
        　隣人は元占い師だ。訊いたほうが早いや。俺は手の平を差し出して尋ねる。<br>
        「生命線ってのはどれだ」<br>
        　占い師は黙って俺が腰掛けている墓石を指差した。七十三歳か。<br>
      </p>
