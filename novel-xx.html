<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タイトル — ナマケモノ文庫</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="novel.css">
  <script src="novel.js" defer></script>
</head>
<body>

  <!-- ヘッダー -->
  <header>
    <a class="back-link" href="index.html">← 一覧へ戻る</a>
    <button class="theme-button" id="js-theme-toggle" type="button">お題</button>
    <a class="site-name" href="index.html">ナマケモノ文庫</a>

    <section class="theme-section" id="js-theme-section">
      <div class="theme-body">
        <div class="theme-inner">
          お題の内容をここに入力してください。
        </div>
      </div>
    </section>
  </header>

  <!-- タイトル・メタ情報 -->
  <div class="novel-header">
    <!--
      タイトルを変更してください。
    -->
    <h1 class="novel-title">タイトル</h1>

    <div class="novel-dates">
      <!--
        必要な日付だけを残し、不要な <span> は削除してください。
        作成日・公開日・更新日 のうち表示したいものだけ使えます。
      -->
      <span>
        <em>作成</em>
        2026年〇月
      </span>
      <span>
        <em>公開</em>
        2026年〇月〇日
      </span>
      <!--
      <span>
        <em>更新</em>
        2025年〇月〇日
      </span>
      -->
    </div>
  </div>

  <!-- 縦書き本文 -->
  <div class="novel-body-wrapper">
    <p class="scroll-hint">← scroll</p>
    <article class="novel-body" id="js-novel-body">

      <!--
        ════════════════════════════════════════
        【本文の書き方】
        ・段落ごとに <p>〜</p> で囲んでください。
        ・ふりがなは <ruby>言葉<rt>ふりがな</rt></ruby> で付けられます。
          例: <ruby>詩織<rt>しおり</rt></ruby>
        ・縦書きでは段落間に margin-left が入ります（novel.css で調整可）。
        ════════════════════════════════════════
      -->

      <p>ここに本文を入力してください。</p>

    </article>
  </div>

  <!-- フッター -->
  <footer>
    <p>© 大懶獣舎</p>
    <p>All rights reserved.</p>
  </footer>

</body>
</html>
